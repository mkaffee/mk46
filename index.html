<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>4:6 Method Brewer</title>
<style>
body {
  font-family: monospace;
  padding: 18px;
  line-height: 1.7;
}

input {
  width: 100%;
  padding: 8px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

button {
  padding: 8px 14px;
  font-size: 15px;
  border: none;
  border-radius: 6px;
  background: #eee;
  margin-right: 6px;
}

button:active {
  background: #ddd;
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 6px;
}

#result {
  white-space: pre;
  margin-top: 18px;
  padding: 14px;
  border: 1px solid #ccc;
  background: #fafafa;
  border-radius: 6px;
}
</style>
</head>
<body>

<h2>4:6 Method Brewer</h2>

<!-- 品名 -->
<label>豆の名前</label>
<input id="beanName" placeholder="例：ブラジル サントス">

<div style="margin-top:6px;">
  <button onclick="showBeanList()">豆リスト</button>
  <button onclick="deleteBean()">削除</button>
  <button onclick="clearAll()">クリア</button>
</div>

<!-- 出来上がり量・豆量（横並び） -->
<div style="margin-top:14px;">出来上がり量(g) と 豆量(g)</div>
<div class="row">
  <input id="final" type="number" placeholder="出来上がり(g)">
  <input id="beans" type="number" placeholder="豆量(g)">
</div>

<button style="margin-top:12px;" onclick="calc()">計算する</button>

<pre id="result"></pre>

<script>
const beanNameEl = document.getElementById("beanName");
const finalEl = document.getElementById("final");
const beansEl = document.getElementById("beans");
const resultEl = document.getElementById("result");

function pad3(n) {
  return String(n).padStart(3, " ");
}

function round1(x) {
  return Math.round(x * 10) / 10;
}

/* -------------------------
   豆リスト（prompt方式）
------------------------- */
function showBeanList() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith("bean_"));
  if (keys.length === 0) {
    alert("保存された豆はありません。");
    return;
  }
  const names = keys.map(k => k.substring(5));
  const pick = prompt("豆を選んでください:\n" + names.join("\n"));
  if (!pick) return;

  const raw = localStorage.getItem("bean_" + pick);
  if (!raw) return;

  const data = JSON.parse(raw);
  beanNameEl.value = pick;
  finalEl.value = data.final;
  beansEl.value = data.beans;
}

function deleteBean() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith("bean_"));
  if (keys.length === 0) {
    alert("削除できる豆がありません。");
    return;
  }
  const names = keys.map(k => k.substring(5));
  const pick = prompt("削除する豆を選んでください:\n" + names.join("\n"));
  if (!pick) return;

  localStorage.removeItem("bean_" + pick);
  alert("削除しました");
}

function clearAll() {
  beanNameEl.value = "";
  finalEl.value = "";
  beansEl.value = "";
}

/* -------------------------
   出来上がり量 → 豆量 自動計算
------------------------- */
finalEl.addEventListener("input", () => {
  const total = Number(finalEl.value);
  if (!total) return;

  if (!beansEl.value) {
    const beans = round1((total * 0.4) / 3);
    beansEl.value = beans;
  }
});

/* -------------------------
   計算本体
------------------------- */
function calc() {
  const total = Number(finalEl.value);
  let beans = Number(beansEl.value);

  if (!total) {
    resultEl.textContent = "出来上がり量を入力してください。";
    return;
  }

  if (!beans) {
    beans = round1((total * 0.4) / 3);
    beansEl.value = beans;
  }

  const ratio = 3.0;
  const first = round1(beans * ratio);

  const front = round1(total * 0.4);
  const second = round1(front - first);

  const back = round1(total - front);

  const b2 = round1(back / 2);
  const b3 = round1(back / 3);

  const c1_2 = round1(first + second + b2);
  const c1_3 = round1(first + second + b3);
  const c2_3 = round1(first + second + b3 * 2);

  let out = "";

  out += "【前半40%】\n";
  out += ` 1投：${pad3(first)} g\n`;
  out += ` 2投：${pad3(second)} g   （累計 ${pad3(front)} g）\n\n`;

  out += "【後半60%】\n";
  out += ` 合計：${back} g\n\n`;

  out += "── 後半60%の分割例 ──\n\n";

  out += "1回（薄め）\n";
  out += ` 1投：${pad3(back)} g   （累計 ${pad3(total)} g）\n\n`;

  out += "2回（軽め）\n";
  out += ` 1投：${pad3(b2)} g   （累計 ${pad3(c1_2)} g）\n`;
  out += ` 2投：${pad3(b2)} g   （累計 ${pad3(total)} g）\n\n`;

  out += "3回（濃いめ）\n";
  out += ` 1投：${pad3(b3)} g   （累計 ${pad3(c1_3)} g）\n`;
  out += ` 2投：${pad3(b3)} g   （累計 ${pad3(c2_3)} g）\n`;
  out += ` 3投：${pad3(b3)} g   （累計 ${pad3(total)} g）\n\n`;

  out += "4:6 Method by Tetsu Kasuya\n";

  resultEl.textContent = out;

  saveBean();
}

/* -------------------------
   保存
------------------------- */
function saveBean() {
  const name = beanNameEl.value.trim();
  if (!name) return;

  const data = {
    final: finalEl.value,
    beans: beansEl.value
  };
  localStorage.setItem("bean_" + name, JSON.stringify(data));
}
</script>

</body>
</html>
