<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>4:6 Method Brewer</title>
<style>
body {
  font-family: monospace;
  padding: 16px;
  line-height: 1.6;
}

input {
  width: 100%;
  padding: 6px;
  font-size: 16px;
  box-sizing: border-box;
}

.row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.row input {
  flex: 1;
}

button {
  padding: 8px 12px;
  margin-top: 8px;
  font-size: 16px;
}

#result {
  white-space: pre;
  margin-top: 16px;
  padding: 12px;
  border: 1px solid #ccc;
  background: #fafafa;
}

.listBox {
  margin-top: 6px;
}

.listBox button {
  margin-left: 6px;
}
</style>
</head>
<body>

<h2>4:6 Method Brewer</h2>

<!-- 品種 -->
<label>品種</label>
<input id="beanName" placeholder="例：エチオピア ナチュラル">
<div class="listBox">
  <select id="beanList"></select>
  <button onclick="deleteBean()">削除</button>
  <button onclick="clearAll()">クリア</button>
</div>

<!-- 出来上がり量・豆量（横並び） -->
<div class="row">
  <input id="final" type="number" placeholder="出来上がり(g)">
  <input id="beans" type="number" placeholder="豆量(g)">
</div>

<button onclick="calc()">計算する</button>

<pre id="result"></pre>

<script>
const beanNameEl = document.getElementById("beanName");
const finalEl = document.getElementById("final");
const beansEl = document.getElementById("beans");
const listEl = document.getElementById("beanList");
const resultEl = document.getElementById("result");

function pad3(n) {
  return String(n).padStart(3, " ");
}

function saveBean() {
  const name = beanNameEl.value.trim();
  if (!name) return;
  const data = {
    final: finalEl.value,
    beans: beansEl.value
  };
  localStorage.setItem("bean_" + name, JSON.stringify(data));
  loadList();
}

function loadList() {
  listEl.innerHTML = "";
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith("bean_")) {
      const opt = document.createElement("option");
      opt.value = k.substring(5);
      opt.textContent = k.substring(5);
      listEl.appendChild(opt);
    }
  }
}

function deleteBean() {
  const name = listEl.value;
  if (!name) return;
  localStorage.removeItem("bean_" + name);
  loadList();
}

function clearAll() {
  beanNameEl.value = "";
  finalEl.value = "";
  beansEl.value = "";
}

listEl.addEventListener("change", () => {
  const name = listEl.value;
  const raw = localStorage.getItem("bean_" + name);
  if (!raw) return;
  const data = JSON.parse(raw);
  beanNameEl.value = name;
  finalEl.value = data.final;
  beansEl.value = data.beans;
});

function calc() {
  const total = Number(finalEl.value);
  let beans = Number(beansEl.value);

  if (!total) {
    resultEl.textContent = "出来上がり量を入力してください。";
    return;
  }

  // 豆量が空なら自動計算（1投目3倍固定 → 前半40% → 40% / 3）
  if (!beans) {
    beans = Math.round((total * 0.4 / 3) * 10) / 10;
    beansEl.value = beans;
  }

  const ratio = 3.0; // 1投目は3倍固定
  const first = beans * ratio;

  const front = Math.round(total * 0.4);
  const back = total - front;

  const second = front - first;

  // 後半分割例
  const b2 = Math.round(back / 2);
  const b3 = Math.round(back / 3);

  const c1_2 = first + second + b2;
  const c1_3 = first + second + b3;
  const c2_3 = first + second + b3 * 2;

  let out = "";

  out += "【前半40%】\n";
  out += ` 1投：${pad3(first)} g\n`;
  out += ` 2投：${pad3(second)} g   （累計 ${pad3(front)} g）\n\n`;

  out += "【後半60%】\n";
  out += ` 合計：${back} g\n\n`;

  out += "── 後半60%の分割例 ──\n\n";

  out += "1回（薄め）\n";
  out += ` 1投：${pad3(back)} g   （累計 ${pad3(total)} g）\n\n`;

  out += "2回（軽め）\n";
  out += ` 1投：${pad3(b2)} g   （累計 ${pad3(c1_2)} g）\n`;
  out += ` 2投：${pad3(b2)} g   （累計 ${pad3(total)} g）\n\n`;

  out += "3回（濃いめ）\n";
  out += ` 1投：${pad3(b3)} g   （累計 ${pad3(c1_3)} g）\n`;
  out += ` 2投：${pad3(b3)} g   （累計 ${pad3(c2_3)} g）\n`;
  out += ` 3投：${pad3(b3)} g   （累計 ${pad3(total)} g）\n\n`;

  out += "4:6 Method by Tetsu Kasuya\n";

  resultEl.textContent = out;

  saveBean();
}

loadList();
</script>

</body>
</html>
