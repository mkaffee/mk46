<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>4:6 Method Brewer</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
}

body {
  font-family: monospace;
  padding: 16px;
  background: #f5f0eb;
  color: #222;
  max-width: 480px;
  margin: 0 auto;
}

h2 {
  font-size: 1.2rem;
  margin: 0 0 16px;
  color: #5c3317;
}

label {
  display: block;
  font-size: 0.8rem;
  color: #666;
  margin-bottom: 4px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 1.1rem;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #fff;
  margin-bottom: 12px;
  -webkit-appearance: none;
}

input:focus {
  outline: none;
  border-color: #8B4513;
}

/* 小ボタン群 */
.btn-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.btn-row button {
  flex: 1;
  padding: 11px 0;
  font-size: 0.95rem;
  font-family: monospace;
  border: none;
  border-radius: 8px;
  background: #e8e0d8;
  color: #333;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.btn-row button:active {
  background: #d4c8bc;
}

/* 3列入力 */
.input-row {
  display: flex;
  gap: 8px;
}

.input-row > div {
  flex: 1;
}

/* 蒸らし倍率・後半分割ボタン共通 */
.bloom-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.bloom-row button {
  flex: 1;
  padding: 11px 0;
  font-size: 0.95rem;
  font-family: monospace;
  border: none;
  border-radius: 8px;
  background: #e8e0d8;
  color: #333;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.2s, color 0.2s;
}

.bloom-row button.selected {
  background: #5c3317;
  color: #f5f0eb;
}

.bloom-row button:active {
  opacity: 0.85;
}

/* Brewボタン */
#brewBtn {
  display: block;
  width: 100%;
  padding: 16px;
  margin-top: 14px;
  font-size: 1.3rem;
  font-family: monospace;
  font-weight: bold;
  letter-spacing: 0.08em;
  background: #e8e0d8;
  color: #5c3317;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
  -webkit-tap-highlight-color: transparent;
}

#brewBtn.brewed {
  background: #5c3317;
  color: #f5f0eb;
}

#brewBtn:active {
  opacity: 0.85;
}

/* 結果 */
#result {
  white-space: pre-wrap;
  margin-top: 18px;
  padding: 14px;
  border: 1px solid #d4c8bc;
  background: #fff;
  border-radius: 10px;
  font-size: 1rem;
  line-height: 1.7;
  overflow-x: auto;
}

/* モーダル */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-content {
  background: #fff;
  padding: 16px;
  border-radius: 14px;
  width: 88%;
  max-width: 400px;
  max-height: 60vh;
  overflow-y: auto;
}

.modal-title {
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 8px;
}

.bean-item {
  padding: 13px 8px;
  border-bottom: 1px solid #f0ebe6;
  cursor: pointer;
  font-size: 1rem;
}

.bean-item:last-child {
  border-bottom: none;
}

.bean-item:active {
  background: #f5f0eb;
}

.modal-footer {
  margin-top: 10px;
  display: flex;
}

.modal-footer button {
  flex: 1;
  padding: 13px;
  font-size: 1rem;
  font-family: monospace;
  border: none;
  border-radius: 8px;
  background: #e8e0d8;
  color: #333;
  cursor: pointer;
}
</style>
</head>
<body>

<h2>4:6 Method Brewer</h2>

<label>豆の名前</label>
<input id="beanName" placeholder="例：ブラジル サントス" autocomplete="off">

<div class="btn-row">
  <button onclick="openBeanModal('select')">豆リスト</button>
  <button onclick="openBeanModal('delete')">削除</button>
  <button onclick="clearAll()">クリア</button>
</div>

<div class="input-row">
  <div>
    <label>湯量(g)</label>
    <input id="final" type="number" placeholder="例：500">
  </div>
  <div>
    <label>豆量(g)</label>
    <input id="beans" type="number" placeholder="自動計算">
  </div>
  <div>
    <label>挽目</label>
    <input id="grind" type="number" placeholder="例：3.5">
  </div>
</div>

<label style="margin-top:10px;">蒸らし倍率</label>
<div class="bloom-row" id="bloomRow">
  <button onclick="setBloom(2,   this)">× 2</button>
  <button onclick="setBloom(2.5, this)">× 2.5</button>
  <button onclick="setBloom(3,   this)" class="selected">× 3</button>
</div>

<label style="margin-top:10px;">後半分割</label>
<div class="bloom-row" id="splitRow">
  <button onclick="setSplit(1, this)">1回</button>
  <button onclick="setSplit(2, this)" class="selected">2回</button>
  <button onclick="setSplit(3, this)">3回</button>
</div>

<button id="brewBtn" onclick="calc()">Brew</button>

<div id="result"></div>

<!-- モーダル -->
<div id="beanModal" class="modal">
  <div class="modal-content">
    <div class="modal-title" id="beanModalTitle"></div>
    <div id="beanModalList"></div>
    <div class="modal-footer">
      <button onclick="closeBeanModal()">キャンセル</button>
    </div>
  </div>
</div>

<script>
const beanNameEl     = document.getElementById("beanName");
const finalEl        = document.getElementById("final");
const beansEl        = document.getElementById("beans");
const grindEl        = document.getElementById("grind");
const resultEl       = document.getElementById("result");
const brewBtn        = document.getElementById("brewBtn");
const bloomRow       = document.getElementById("bloomRow");
const splitRow       = document.getElementById("splitRow");
const beanModal      = document.getElementById("beanModal");
const beanModalTitle = document.getElementById("beanModalTitle");
const beanModalList  = document.getElementById("beanModalList");

let bloomRatio = 3;
let splitCount = 2;

function pad2(n) {
  return String(n).padStart(2, " ");
}

function pad3(n) {
  return String(n).padStart(3, " ");
}

/* -------------------------
   Brewボタン 色変化
------------------------- */
function setBrewed(on) {
  brewBtn.classList.toggle("brewed", on);
}

/* -------------------------
   蒸らし倍率ボタン
------------------------- */
function setBloom(v, btn) {
  bloomRatio = v;
  bloomRow.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  setBrewed(false);
}

function applyBloom(v) {
  bloomRatio = v;
  bloomRow.querySelectorAll("button").forEach(b => {
    b.classList.toggle("selected", parseFloat(b.textContent.replace("×","").trim()) === v);
  });
}

/* -------------------------
   後半分割ボタン
------------------------- */
function setSplit(v, btn) {
  splitCount = v;
  splitRow.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  setBrewed(false);
}

function applySplit(v) {
  splitCount = v;
  const labels = [1, 2, 3];
  splitRow.querySelectorAll("button").forEach((b, i) => {
    b.classList.toggle("selected", labels[i] === v);
  });
}

/* -------------------------
   起動時：lastBean 自動ロード
------------------------- */
window.addEventListener("DOMContentLoaded", () => {
  const lastBean = localStorage.getItem("lastBean");
  if (lastBean) loadBean(lastBean);
});

/* -------------------------
   モーダル（豆リスト）
------------------------- */
let beanModalMode = "select";

function openBeanModal(mode) {
  beanModalMode = mode;

  const keys  = Object.keys(localStorage).filter(k => k.startsWith("bean_"));
  const names = keys.map(k => k.substring(5));

  beanModalList.innerHTML = "";

  if (names.length === 0) {
    beanModalTitle.textContent = "保存された豆はありません";
  } else {
    beanModalTitle.textContent = (mode === "select") ? "豆を選んでください" : "削除する豆を選んでください";

    names.forEach(name => {
      const div = document.createElement("div");
      div.textContent = name;
      div.className = "bean-item";
      div.onclick = () => {
        if (beanModalMode === "select") {
          loadBean(name);
        } else {
          deleteBean(name);
        }
        closeBeanModal();
      };
      beanModalList.appendChild(div);
    });
  }

  beanModal.style.display = "flex";
}

function closeBeanModal() {
  beanModal.style.display = "none";
}

beanModal.addEventListener("click", (e) => {
  if (e.target === beanModal) closeBeanModal();
});

function loadBean(name) {
  const raw = localStorage.getItem("bean_" + name);
  if (!raw) return;
  const data = JSON.parse(raw);
  beanNameEl.value = name;
  finalEl.value    = data.final;
  beansEl.value    = data.beans;
  grindEl.value    = data.grind || "";
  applyBloom(data.bloom  || 3);
  applySplit(data.split  || 2);
  setBrewed(false);
}

function deleteBean(name) {
  localStorage.removeItem("bean_" + name);
  const lastBean = localStorage.getItem("lastBean");
  if (lastBean === name) localStorage.removeItem("lastBean");
  alert("削除しました: " + name);
}

function clearAll() {
  beanNameEl.value     = "";
  finalEl.value        = "";
  beansEl.value        = "";
  grindEl.value        = "";
  resultEl.innerHTML   = "";
  applyBloom(3);
  applySplit(2);
  setBrewed(false);
}

/* -------------------------
   湯量 → 豆量 自動計算
------------------------- */
finalEl.addEventListener("input", () => {
  const total = Number(finalEl.value);
  if (!total) return;
  beansEl.value = Math.floor(total / 15);
  setBrewed(false);
});

/* -------------------------
   計算本体
------------------------- */
function calc() {
  const total = Number(finalEl.value);
  let beans   = Number(beansEl.value);

  if (!total) {
    resultEl.textContent = "湯量を入力してください。";
    return;
  }

  if (!beans) {
    beans = Math.floor(total / 15);
    beansEl.value = beans;
  }

  const first  = Math.round(beans * bloomRatio);
  const front  = Math.round(total * 0.4);
  const second = front - first;
  const back   = total - front;

  const b2 = Math.round(back / 2);
  const b3 = Math.round(back / 3);

  const c1_2 = first + second + b2;
  const c1_3 = first + second + b3;
  const c2_3 = first + second + b3 * 2;

  const name  = beanNameEl.value.trim();
  const grind = grindEl.value.trim();

  let lines = [];

  const ratio = Math.round(total / beans);
  if (name) lines.push(`<strong>${name}　${beans} g</strong>`);
  lines.push(`<strong>Brew Ratio >> 1:${ratio}</strong>`);
  if (grind) lines.push(`挽目：${grind}`);
  if (name || grind) lines.push("");

  lines.push(`<strong>── 前半40%──</strong>`);
  lines.push(`<strong> 1投：${pad3(first)} g</strong>`);
  lines.push(`<strong> 2投：${pad3(second)} g  （累計 ${pad3(front)} g）</strong>`);
  lines.push("");

  lines.push(`<strong>── 後半60%──</strong>`);

  if (splitCount === 1) {
    lines.push(`<strong> 1投：${pad3(back)} g  （累計 ${pad3(total)} g）</strong>`);
  } else if (splitCount === 2) {
    lines.push(`<strong> 1投：${pad3(b2)} g  （累計 ${pad3(c1_2)} g）</strong>`);
    lines.push(`<strong> 2投：${pad3(b2)} g  （累計 ${pad3(total)} g）</strong>`);
  } else {
    lines.push(`<strong> 1投：${pad3(b3)} g  （累計 ${pad3(c1_3)} g）</strong>`);
    lines.push(`<strong> 2投：${pad3(b3)} g  （累計 ${pad3(c2_3)} g）</strong>`);
    lines.push(`<strong> 3投：${pad3(b3)} g  （累計 ${pad3(total)} g）</strong>`);
  }
  lines.push("");

  lines.push("4:6 Method by Tetsu Kasuya");

  resultEl.innerHTML = lines.join("\n");
  setBrewed(true);

  resultEl.scrollIntoView({ behavior: "smooth" });

  saveBean();
}

/* -------------------------
   保存
------------------------- */
function saveBean() {
  const name = beanNameEl.value.trim();
  if (!name) return;
  const data = {
    final: finalEl.value,
    beans: beansEl.value,
    grind: grindEl.value.trim(),
    bloom: bloomRatio,
    split: splitCount
  };
  localStorage.setItem("bean_" + name, JSON.stringify(data));
  localStorage.setItem("lastBean", name);
}
</script>

</body>
</html>
