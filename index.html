<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>4:6 Method Brewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: monospace;
  padding: 16px;
  background: #f5f0eb;
  color: #222;
  max-width: 480px;
  margin: 0 auto;
}

h2 {
  font-size: 1.2rem;
  margin: 0 0 16px;
  color: #5c3317;
}

label {
  display: block;
  font-size: 0.8rem;
  color: #666;
  margin-bottom: 4px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 1.1rem;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #fff;
  margin-bottom: 12px;
  -webkit-appearance: none;
}

input:focus {
  outline: none;
  border-color: #8B4513;
}

/* 小ボタン群 */
.btn-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.btn-row button {
  flex: 1;
  padding: 11px 0;
  font-size: 0.95rem;
  font-family: monospace;
  border: none;
  border-radius: 8px;
  background: #e8e0d8;
  color: #333;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.btn-row button:active { background: #d4c8bc; }

/* 3列入力 */
.input-row {
  display: flex;
  gap: 8px;
}
.input-row > div { flex: 1; }

/* 蒸らし倍率ボタン */
.ratio-row {
  display: flex;
  gap: 8px;
  margin-top: 6px;
  margin-bottom: 10px;
}

.ratio-row button {
  flex: 1;
  padding: 10px 0;
  font-size: 1rem;
  border: none;
  border-radius: 8px;
  background: #e8e0d8;
  color: #333;
  cursor: pointer;
}

.ratio-row button.active {
  background: #5c3317;
  color: #f5f0eb;
}

/* Brewボタン */
#brewBtn {
  display: block;
  width: 100%;
  padding: 16px;
  margin-top: 6px;
  font-size: 1.3rem;
  font-family: monospace;
  font-weight: bold;
  letter-spacing: 0.08em;
  background: #e8e0d8;
  color: #5c3317;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
  -webkit-tap-highlight-color: transparent;
}

#brewBtn.brewed {
  background: #5c3317;
  color: #f5f0eb;
}

#brewBtn:active { opacity: 0.85; }

/* 結果 */
#result {
  white-space: pre;
  margin-top: 18px;
  padding: 14px;
  border: 1px solid #d4c8bc;
  background: #fff;
  border-radius: 10px;
  font-size: 1rem;
  line-height: 1.7;
  overflow-x: auto;
}

/* モーダル */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-content {
  background: #fff;
  padding: 16px;
  border-radius: 14px;
  width: 88%;
  max-width: 400px;
  max-height: 60vh;
  overflow-y: auto;
}

.modal-title {
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 8px;
}

.bean-item {
  padding: 13px 8px;
  border-bottom: 1px solid #f0ebe6;
  cursor: pointer;
  font-size: 1rem;
}

.bean-item:last-child { border-bottom: none; }
.bean-item:active { background: #f5f0eb; }

.modal-footer {
  margin-top: 10px;
  display: flex;
}

.modal-footer button {
  flex: 1;
  padding: 13px;
  font-size: 1rem;
  font-family: monospace;
  border: none;
  border-radius: 8px;
  background: #e8e0d8;
  color: #333;
  cursor: pointer;
}
</style>
</head>
<body>

<h2>4:6 Method Brewer</h2>

<label>豆の名前</label>
<input id="beanName" placeholder="例：ブラジル サントス" autocomplete="off">

<div class="btn-row">
  <button onclick="openBeanModal('select')">豆リスト</button>
  <button onclick="openBeanModal('delete')">削除</button>
  <button onclick="clearAll()">クリア</button>
</div>

<div class="input-row">
  <div>
    <label>湯量(g)</label>
    <input id="final" type="number" placeholder="例：500">
  </div>
  <div>
    <label>豆量(g)</label>
    <input id="beans" type="number" placeholder="自動計算">
  </div>
  <div>
    <label>挽目</label>
    <input id="grind" type="text" placeholder="例：3.5">
  </div>
</div>

<!-- 蒸らし倍率 -->
<div class="ratio-row">
  <button id="r20" onclick="setRatio(2.0)">2.0</button>
  <button id="r25" onclick="setRatio(2.5)">2.5</button>
  <button id="r30" class="active" onclick="setRatio(3.0)">3.0</button>
</div>

<button id="brewBtn" onclick="calc()">Brew</button>

<pre id="result"></pre>

<!-- モーダル -->
<div id="beanModal" class="modal">
  <div class="modal-content">
    <div class="modal-title" id="beanModalTitle"></div>
    <div id="beanModalList"></div>
    <div class="modal-footer">
      <button onclick="closeBeanModal()">キャンセル</button>
    </div>
  </div>
</div>

<script>
let ratio = 3.0;

function setRatio(r) {
  ratio = r;
  document.querySelectorAll(".ratio-row button").forEach(btn => btn.classList.remove("active"));
  if (r === 2.0) r20.classList.add("active");
  if (r === 2.5) r25.classList.add("active");
  if (r === 3.0) r30.classList.add("active");
  setBrewed(false);
}

const beanNameEl = document.getElementById("beanName");
const finalEl    = document.getElementById("final");
const beansEl    = document.getElementById("beans");
const grindEl    = document.getElementById("grind");
const resultEl   = document.getElementById("result");
const brewBtn    = document.getElementById("brewBtn");
const beanModal  = document.getElementById("beanModal");
const beanModalTitle = document.getElementById("beanModalTitle");
const beanModalList  = document.getElementById("beanModalList");

function pad3(n) { return String(n).padStart(3, " "); }

function setBrewed(on) { brewBtn.classList.toggle("brewed", on); }

window.addEventListener("DOMContentLoaded", () => {
  const lastBean = localStorage.getItem("lastBean");
  if (lastBean) loadBean(lastBean);
});

let beanModalMode = "select";

function openBeanModal(mode) {
  beanModalMode = mode;
  const keys  = Object.keys(localStorage).filter(k => k.startsWith("bean_"));
  const names = keys.map(k => k.substring(5));

  beanModalList.innerHTML = "";

  if (names.length === 0) {
    beanModalTitle.textContent = "保存された豆はありません";
  } else {
    beanModalTitle.textContent = (mode === "select") ? "豆を選んでください" : "削除する豆を選んでください";

    names.forEach(name => {
      const div = document.createElement("div");
      div.textContent = name;
      div.className = "bean-item";
      div.onclick = () => {
        if (beanModalMode === "select") loadBean(name);
        else deleteBean(name);
        closeBeanModal();
      };
      beanModalList.appendChild(div);
    });
  }

  beanModal.style.display = "flex";
}

function closeBeanModal() { beanModal.style.display = "none"; }

beanModal.addEventListener("click", (e) => {
  if (e.target === beanModal) closeBeanModal();
});

function loadBean(name) {
  const raw = localStorage.getItem("bean_" + name);
  if (!raw) return;
  const data = JSON.parse(raw);
  beanNameEl.value = name;
  finalEl.value    = data.final;
  beansEl.value    = data.beans;
  grindEl.value    = data.grind || "";
  setBrewed(false);
}

function deleteBean(name) {
  localStorage.removeItem("bean_" + name);
  const lastBean = localStorage.getItem("lastBean");
  if (lastBean === name) localStorage.removeItem("lastBean");
  alert("削除しました: " + name);
}

function clearAll() {
  beanNameEl.value = "";
  finalEl.value    = "";
  beansEl.value    = "";
  grindEl.value    = "";
  resultEl.textContent = "";
  setBrewed(false);
}

finalEl.addEventListener("input", () => {
  const total = Number(finalEl.value);
  if (!total) return;
  beansEl.value = Math.floor(total / 15);
  setBrewed(false);
});

function calc() {
  const total = Number(finalEl.value);
  let beans   = Number(beansEl.value);

  if (!total) {
    resultEl.textContent = "湯量を入力してください。";
    return;
  }

  if (!beans) {
    beans = Math.floor(total / 15);
    beansEl.value = beans;
  }

  const first  = Math.round(beans * ratio);
  const front  = Math.round(total * 0.4);
  const second = front - first;
  const back   = total - front;

  const b2 = Math.round(back / 2);
  const b3 = Math.round(back / 3);

  const c1_2 = first + second + b2;
  const c1_3 = first + second + b3;
  const c2_3 = first + second + b3 * 2;

  const name  = beanNameEl.value.trim();
  const grind = grindEl.value.trim();

  let out = "";
  if (name) out += `${name}　${beans} g\n`;
  if (grind) out += `挽目：${grind}\n`;
  if (name || grind) out += "\n";

  out += `【前半40%（蒸らし倍率 ${ratio} 倍）】\n`;
  out += ` 1投：${pad3(first)} g\n`;
  out += ` 2投：${pad3(second)} g   （累計 ${pad3(front)} g）\n\n`;

  out += "── 後半60%（分割例）──\n\n";

  out += "2回（軽め）\n";
  out += ` 1投：${pad3(b2)} g   （累計 ${pad3(c1_2)} g）\n`;
  out += ` 2投：${pad3(b2)} g   （累計 ${pad3(total)} g）\n\n`;

  out += "1回（薄め）\n";
  out += ` 1投：${pad3(back)} g   （累計 ${pad3(total)} g）\n\n`;

  out += "3回（濃いめ）\n";
  out += ` 1投：${pad3(b3)} g   （累計 ${pad3(c1_3)} g）\n`;
  out += ` 2投：${pad3(b3)} g   （累計 ${pad3(c2_3)} g）\n`;
  out += ` 3投：${pad3(b3)} g   （累計 ${pad3(total)} g）\n\n`;

  out += "4:6 Method by Tetsu Kasuya\n";

  resultEl.textContent = out;
  setBrewed(true);

  resultEl.scrollIntoView({ behavior: "smooth" });

  saveBean();
}

function saveBean() {
  const name = beanNameEl.value.trim();
  if (!name) return;
  const data = {
    final: finalEl.value,
    beans: beansEl.value,
    grind: grindEl.value.trim()
  };
  localStorage.setItem("bean_" + name, JSON.stringify(data));
  localStorage.setItem("lastBean", name);
}
</script>

</body>
</html>
