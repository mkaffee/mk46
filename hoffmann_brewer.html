<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Hoffmann V60 Brewer</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
}

body {
  font-family: monospace;
  padding: 16px;
  background: #eaf0f5;
  color: #222;
  max-width: 480px;
  margin: 0 auto;
}

h2 {
  font-size: 1.2rem;
  margin: 0 0 16px;
  color: #5c3317;
}

label {
  display: block;
  font-size: 0.8rem;
  color: #666;
  margin-bottom: 4px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 1.1rem;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #fff;
  margin-bottom: 12px;
  -webkit-appearance: none;
}

input:focus {
  outline: none;
  border-color: #8B4513;
}

.btn-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.btn-row button {
  flex: 1;
  padding: 11px 0;
  font-size: 0.95rem;
  font-family: monospace;
  border: none;
  border-radius: 8px;
  background: #e8e0d8;
  color: #333;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.btn-row button:active {
  background: #d4c8bc;
}

.input-row {
  display: flex;
  gap: 8px;
}

.input-row > div {
  flex: 1;
}

#brewBtn {
  display: block;
  width: 100%;
  padding: 16px;
  margin-top: 14px;
  font-size: 1.3rem;
  font-family: monospace;
  font-weight: bold;
  letter-spacing: 0.08em;
  background: #e8e0d8;
  color: #5c3317;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
  -webkit-tap-highlight-color: transparent;
}

#brewBtn.brewed {
  background: #5c3317;
  color: #f5f0eb;
}

#brewBtn:active {
  opacity: 0.85;
}

#result {
  white-space: pre;
  margin-top: 18px;
  padding: 14px;
  border: 1px solid #d4c8bc;
  background: #fff;
  border-radius: 10px;
  font-size: 1rem;
  line-height: 1.7;
  overflow-x: auto;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-content {
  background: #fff;
  padding: 16px;
  border-radius: 14px;
  width: 88%;
  max-width: 400px;
  max-height: 60vh;
  overflow-y: auto;
}

.modal-title {
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 8px;
}

.bean-item {
  padding: 13px 8px;
  border-bottom: 1px solid #f0ebe6;
  cursor: pointer;
  font-size: 1rem;
}

.bean-item:last-child {
  border-bottom: none;
}

.bean-item:active {
  background: #f5f0eb;
}

.modal-footer {
  margin-top: 10px;
  display: flex;
}

.modal-footer button {
  flex: 1;
  padding: 13px;
  font-size: 1rem;
  font-family: monospace;
  border: none;
  border-radius: 8px;
  background: #e8e0d8;
  color: #333;
  cursor: pointer;
}
</style>
</head>
<body>

<h2>Hoffmann V60 Brewer</h2>

<label>豆の名前</label>
<input id="beanName" placeholder="例：エチオピア イルガチェフェ" autocomplete="off">

<div class="btn-row">
  <button onclick="openBeanModal('select')">豆リスト</button>
  <button onclick="openBeanModal('delete')">削除</button>
  <button onclick="clearAll()">クリア</button>
</div>

<div class="input-row">
  <div>
    <label>出来上がり(g)</label>
    <input id="final" type="number" placeholder="例：500">
  </div>
  <div>
    <label>豆量(g)</label>
    <input id="beans" type="number" placeholder="自動計算">
  </div>
  <div>
    <label>挽目</label>
    <input id="grind" type="number" step="0.1" placeholder="例：3.0">
  </div>
</div>

<button id="brewBtn" onclick="calc()">Brew</button>

<div id="result"></div>

<div id="beanModal" class="modal">
  <div class="modal-content">
    <div class="modal-title" id="beanModalTitle"></div>
    <div id="beanModalList"></div>
    <div class="modal-footer">
      <button onclick="closeBeanModal()">キャンセル</button>
    </div>
  </div>
</div>

<script>
const beanNameEl     = document.getElementById("beanName");
const finalEl        = document.getElementById("final");
const beansEl        = document.getElementById("beans");
const grindEl        = document.getElementById("grind");
const resultEl       = document.getElementById("result");
const brewBtn        = document.getElementById("brewBtn");
const beanModal      = document.getElementById("beanModal");
const beanModalTitle = document.getElementById("beanModalTitle");
const beanModalList  = document.getElementById("beanModalList");

function pad3(n) {
  return String(n).padStart(3, " ");
}

function setBrewed(on) {
  brewBtn.classList.toggle("brewed", on);
}

window.addEventListener("DOMContentLoaded", () => {
  const lastBean = localStorage.getItem("hoff_lastBean");
  if (lastBean) loadBean(lastBean);
});

let beanModalMode = "select";

function openBeanModal(mode) {
  beanModalMode = mode;
  const keys  = Object.keys(localStorage).filter(k => k.startsWith("hoff_bean_"));
  const names = keys.map(k => k.substring(10));
  beanModalList.innerHTML = "";
  if (names.length === 0) {
    beanModalTitle.textContent = "保存された豆はありません";
  } else {
    beanModalTitle.textContent = (mode === "select") ? "豆を選んでください" : "削除する豆を選んでください";
    names.forEach(name => {
      const div = document.createElement("div");
      div.textContent = name;
      div.className = "bean-item";
      div.onclick = () => {
        if (beanModalMode === "select") {
          loadBean(name);
        } else {
          deleteBean(name);
        }
        closeBeanModal();
      };
      beanModalList.appendChild(div);
    });
  }
  beanModal.style.display = "flex";
}

function closeBeanModal() {
  beanModal.style.display = "none";
}

beanModal.addEventListener("click", (e) => {
  if (e.target === beanModal) closeBeanModal();
});

function loadBean(name) {
  const raw = localStorage.getItem("hoff_bean_" + name);
  if (!raw) return;
  const data = JSON.parse(raw);
  beanNameEl.value = name;
  finalEl.value    = data.final;
  beansEl.value    = data.beans;
  grindEl.value    = data.grind || "";
  setBrewed(false);
}

function deleteBean(name) {
  localStorage.removeItem("hoff_bean_" + name);
  const lastBean = localStorage.getItem("hoff_lastBean");
  if (lastBean === name) localStorage.removeItem("hoff_lastBean");
  alert("削除しました: " + name);
}

function clearAll() {
  beanNameEl.value     = "";
  finalEl.value        = "";
  beansEl.value        = "";
  grindEl.value        = "";
  resultEl.textContent = "";
  setBrewed(false);
}

// 出来上がり量 → 豆量自動計算（1:18）
finalEl.addEventListener("input", () => {
  const total = Number(finalEl.value);
  if (!total) return;
  beansEl.value = Math.round(total / 18);
  setBrewed(false);
});

function calc() {
  const total = Number(finalEl.value);
  let beans   = Number(beansEl.value);

  if (!total) {
    resultEl.textContent = "出来上がり量を入力してください。";
    return;
  }

  if (!beans) {
    beans = Math.round(total / 18);
    beansEl.value = beans;
  }

  // ホフマン式計算
  // 蒸らし：豆の2倍量
  const bloom   = beans * 2;
  // 1投目：全体の60%まで（蒸らし分含む）
  const pour1target = Math.round(total * 0.6);
  const pour1   = pour1target - bloom;
  // 2投目：残り
  const pour2   = total - pour1target;

  // 累計
  const cum_bloom = bloom;
  const cum_pour1 = pour1target;
  const cum_pour2 = total;

  const name  = beanNameEl.value.trim();
  const grind = grindEl.value.trim();

  let lines = [];
  const ratio = (total / beans).toFixed(1);
  if (name) lines.push(`<strong>${name}　${beans} g</strong>`);
  else lines.push(`<strong>${beans} g</strong>`);
  lines.push(`Brew Ratio >> 1:${ratio}`);
  if (grind) lines.push(`挽目：${grind}`);
  if (name || grind) lines.push("");

  lines.push(`<strong>【蒸らし】　0:00〜0:45</strong>`);
  lines.push(`<strong> 注湯：${pad3(bloom)} g   （累計 ${pad3(cum_bloom)} g）</strong>`);
  lines.push(`<strong> → 即ゆする</strong>`);
  lines.push("");

  lines.push(`<strong>【1投目】　0:45〜1:15</strong>`);
  lines.push(`<strong> 注湯：${pad3(pour1)} g   （累計 ${pad3(cum_pour1)} g）</strong>`);
  lines.push("");

  lines.push(`<strong>【2投目】　1:15〜1:45</strong>`);
  lines.push(`<strong> 注湯：${pad3(pour2)} g   （累計 ${pad3(cum_pour2)} g）</strong>`);
  lines.push(`<strong> → ゆする → 湯面半分でゆする（粉床を平らに）</strong>`);
  lines.push("");

  lines.push(`落ち切り目標：3:30`);
  lines.push("");
  lines.push("Hoffmann Ultimate V60 Technique");

  resultEl.innerHTML = lines.join("\n");
  setBrewed(true);
  resultEl.scrollIntoView({ behavior: "smooth" });
  saveBean();
}

function saveBean() {
  const name = beanNameEl.value.trim();
  if (!name) return;
  const data = {
    final: finalEl.value,
    beans: beansEl.value,
    grind: grindEl.value.trim()
  };
  localStorage.setItem("hoff_bean_" + name, JSON.stringify(data));
  localStorage.setItem("hoff_lastBean", name);
}
</script>

</body>
</html>
