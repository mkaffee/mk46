<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>mk46 v2.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  padding: 16px;
  max-width: 480px;
  margin: 0 auto;
}

label {
  font-size: 18px;
}

input, select {
  font-size: 20px;
  padding: 8px;
  width: 100%;
  box-sizing: border-box;
  margin-top: 4px;
}

button {
  width: 100%;
  padding: 14px;
  font-size: 20px;
  margin-top: 16px;
  background: #333;
  color: white;
  border: none;
  border-radius: 6px;
}

/* 結果表示欄の枠＋スクロール */
#result {
  margin-top: 24px;
  font-family: monospace;
  white-space: pre;
  font-size: 18px;
  line-height: 1.6;

  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 12px;

  max-height: 300px;     /* スクロール可能に */
  overflow-y: auto;
}
</style>
</head>

<body>

<h2>mk46 v2.1（4:6メソッド）</h2>

<label>出来上がり量（g）：</label>
<input type="number" id="final" value="500">

<label>豆量（g）：</label>
<input type="number" id="beans" value="33.3">

<label>蒸らし倍率：</label>
<select id="ratio">
  <option value="2.0">2.0倍（軽め）</option>
  <option value="2.3" selected>2.3倍（標準）</option>
  <option value="2.5">2.5倍（濃いめ）</option>
  <option value="3.0">3.0倍（しっかり）</option>
</select>

<button onclick="calc()">計算する</button>

<div id="result"></div>

<script>
function pad(n) {
  if (n < 10) return "  " + n;
  if (n < 100) return " " + n;
  return n;
}

function calc() {
  const final = Number(document.getElementById("final").value);
  const beans = Number(document.getElementById("beans").value);
  const ratio = Number(document.getElementById("ratio").value);

  const first = Math.round(beans * ratio);
  const frontTotal = Math.round(final * 0.4);
  const second = frontTotal - first;

  const backTotal = final - frontTotal;
  const backEach = Math.round(backTotal / 2);

  let cum = 0;
  let out = "";

  out += "【4:6メソッド】  豆量：" + beans + " g\n\n";

  out += "── 前半40%（フレーバー） ──\n";
  cum += first;
  out += `1投目： ${pad(first)} g   （累計 ${pad(cum)} g）\n`;

  cum += second;
  out += `2投目： ${pad(second)} g   （累計 ${pad(cum)} g）\n\n`;

  out += "── 後半60%（濃度調整） ──\n";
  cum += backEach;
  out += `3投目： ${pad(backEach)} g   （累計 ${pad(cum)} g）\n`;

  cum += backEach;
  out += `4投目： ${pad(backEach)} g   （累計 ${pad(cum)} g）\n`;

  document.getElementById("result").innerText = out;

    /* ← 自動スクロール復活 */
  document.getElementById("result").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
