<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4:6メソッド計算機</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #fafafa;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 480px;
}

h2 {
  font-size: 1.6em;
  margin-bottom: 10px;
}

label {
  font-size: 1.1em;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 14px;
  font-size: 1.2em;
  margin: 10px 0 20px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 16px;
  font-size: 1.3em;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}

.result {
  margin-top: 25px;
  padding: 18px;
  background: #fff;
  border-radius: 10px;
  font-size: 1.2em;
  line-height: 1.6em;
  border: 1px solid #ddd;
}
</style>
</head>

<body>
<div class="container">

<h2>4:6メソッド計算機</h2>

<label>出来上がり量 (ml)</label>
<input type="number" id="total" value="500">

<label>豆量 (g) ※空なら自動計算</label>
<input type="number" id="beans">

<label>1投目倍率（豆の◯倍）</label>
<select id="ratio">
  <option value="2.0">2.0倍</option>
  <option value="2.2">2.2倍</option>
  <option value="2.3" selected>2.3倍（推奨）</option>
  <option value="2.5">2.5倍</option>
</select>

<label>濃度</label>
<select id="strength">
  <option value="normal">普通（2回）</option>
  <option value="light">軽め（1回）</option>
  <option value="strong">濃いめ（3回）</option>
</select>

<button onclick="calc()">計算する</button>

<div class="result" id="result"></div>

</div>

<script>
function calc() {
  const total = parseFloat(document.getElementById("total").value);
  const beansInput = document.getElementById("beans").value;
  const ratio = parseFloat(document.getElementById("ratio").value);
  const strength = document.getElementById("strength").value;

  const beans = beansInput ? parseFloat(beansInput) : (total / 15);

  const front = total * 0.4;
  const back = total * 0.6;

  const first = beans * ratio;
  const second = front - first;

  let splits = 2;
  if (strength === "light") splits = 1;
  if (strength === "strong") splits = 3;

  const backPer = back / splits;

  document.getElementById("result").innerHTML =
    "<b>豆量：</b>" + beans.toFixed(1) + " g<br>" +
    "<b>前半40％：</b>" + front.toFixed(0) + " ml<br>" +
    "・1投目（豆×" + ratio + "）： " + first.toFixed(0) + " ml<br>" +
    "・2投目： " + second.toFixed(0) + " ml<br><br>" +
    "<b>後半60％：</b>" + back.toFixed(0) + " ml<br>" +
    "・回数：" + splits + " 回<br>" +
    "・1回あたり：" + backPer.toFixed(0) + " ml";

  // ▼▼ 自動スクロール ▼▼
  document.getElementById("result").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
