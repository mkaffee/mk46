<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>mk46 v2</title>
<style>
body {
  font-family: sans-serif;
  padding: 20px;
}
label, select, input {
  font-size: 18px;
}
#result {
  margin-top: 20px;
  font-family: monospace; /* 等幅フォント */
  white-space: pre;       /* スペースをそのまま表示 */
  font-size: 18px;
  line-height: 1.6;
}
.section-title {
  margin-top: 12px;
  font-weight: bold;
}
</style>
</head>
<body>

<h2>mk46 v2（4:6メソッド）</h2>

<label>出来上がり量（g）：</label>
<input type="number" id="final" value="500"><br><br>

<label>豆量（g）：</label>
<input type="number" id="beans" value="33.3"><br><br>

<label>蒸らし倍率：</label>
<select id="ratio">
  <option value="2.0">2.0倍（軽め）</option>
  <option value="2.3" selected>2.3倍（標準）</option>
  <option value="2.5">2.5倍（濃いめ）</option>
  <option value="3.0">3.0倍（しっかり）</option>
</select>

<br><br>
<button onclick="calc()">計算する</button>

<div id="result"></div>

<script>
function pad(n) {
  // 桁揃え（最大3桁想定）
  if (n < 10) return "  " + n;   // 1桁 → 前に2スペース
  if (n < 100) return " " + n;   // 2桁 → 前に1スペース
  return n;                      // 3桁 → そのまま
}

function calc() {
  const final = Number(document.getElementById("final").value);
  const beans = Number(document.getElementById("beans").value);
  const ratio = Number(document.getElementById("ratio").value);

  const first = Math.round(beans * ratio);   // 1投目
  const frontTotal = Math.round(final * 0.4); // 前半40%
  const second = frontTotal - first;          // 2投目

  const backTotal = final - frontTotal;       // 後半60%
  const backEach = Math.round(backTotal / 2); // 3投目・4投目

  let cum = 0;
  let out = "";

  out += "【4:6メソッド】\n\n";
  out += `豆量：${beans} g\n\n`;

  out += "── 前半40%（フレーバー） ──\n";
  cum += first;
  out += `1投目： ${pad(first)} g   （累計 ${pad(cum)} g）\n`;

  cum += second;
  out += `2投目： ${pad(second)} g   （累計 ${pad(cum)} g）\n\n`;

  out += "── 後半60%（濃度調整） ──\n";
  cum += backEach;
  out += `3投目： ${pad(backEach)} g   （累計 ${pad(cum)} g）\n`;

  cum += backEach;
  out += `4投目： ${pad(backEach)} g   （累計 ${pad(cum)} g）\n`;

  document.getElementById("result").textContent = out;
}
</script>

</body>
</html>
