<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>mk46 v2.5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  padding: 16px;
  max-width: 480px;
  margin: 0 auto;
}

label {
  font-size: 18px;
}

input {
  font-size: 20px;
  padding: 8px;
  width: 100%;
  box-sizing: border-box;
  margin-top: 4px;
}

/* コーヒー色ボタン */
button {
  width: 100%;
  padding: 14px;
  font-size: 20px;
  margin-top: 16px;
  background: #6F4E37;
  color: white;
  border: none;
  border-radius: 6px;
  transition: background 0.2s;
}
button:active {
  background: #8B5E3C;
}

/* 倍率ボタンUI */
.ratio-buttons {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.ratio-btn {
  flex: 1;
  padding: 12px 0;
  font-size: 18px;
  text-align: center;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fff;
  user-select: none;
}

.ratio-btn.active {
  background: #6F4E37;
  color: white;
  border-color: #6F4E37;
}

/* 結果表示欄 */
#result {
  margin-top: 24px;
  font-family: monospace;
  white-space: pre;
  font-size: 18px;
  line-height: 1.6;

  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 12px;

  max-height: 300px;
  overflow-y: auto;
}
</style>
</head>

<body>

<h2>mk46 v2.5（4:6メソッド）</h2>

<label>出来上がり量（g）：</label>
<input type="number" id="final" value="500" oninput="autoBeans()">

<label>豆量（g）：</label>
<input type="number" id="beans" value="33.3">

<label>蒸らし倍率：</label>
<div class="ratio-buttons">
  <div class="ratio-btn" onclick="setRatio(2.3)">2.3</div>
  <div class="ratio-btn active" onclick="setRatio(2.5)">2.5</div>
  <div class="ratio-btn" onclick="setRatio(2.7)">2.7</div>
  <div class="ratio-btn" onclick="setRatio(3.0)">3.0</div>
</div>

<button onclick="calc()">計算する</button>

<div id="result"></div>

<script>
let ratio = 2.5;  // デフォルト倍率

function setRatio(r) {
  ratio = r;

  document.querySelectorAll('.ratio-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.textContent == r) btn.classList.add('active');
  });
}

/* 出来上がり量から豆量を自動計算（÷15） */
function autoBeans() {
  const final = Number(document.getElementById("final").value);
  if (final > 0) {
    const beans = (final / 15).toFixed(1);
    document.getElementById("beans").value = beans;
  }
}

function pad(n) {
  if (n < 10) return "  " + n;
  if (n < 100) return " " + n;
  return n;
}

function calc() {
  const final = Number(document.getElementById("final").value);
  const beans = Number(document.getElementById("beans").value);

  const first = Math.round(beans * ratio);
  const frontTotal = Math.round(final * 0.4);
  const second = frontTotal - first;

  const backTotal = final - frontTotal;
  const backEach = Math.round(backTotal / 2);

  let cum = 0;
  let out = "";

  out += "【4:6メソッド】  豆量：" + beans + " g\n\n";

  out += "── 前半40%（フレーバー） ──\n";
  cum += first;
  out += `1投目： ${pad(first)} g   （累計 ${pad(cum)} g）\n`;

  cum += second;
  out += `2投目： ${pad(second)} g   （累計 ${pad(cum)} g）\n\n`;

  out += "── 後半60%（濃度調整） ──\n";
  cum += backEach;
  out += `3投目： ${pad(backEach)} g   （累計 ${pad(cum)} g）\n`;

  cum += backEach;
  out += `4投目： ${pad(backEach)} g   （累計 ${pad(cum)} g）\n`;

  document.getElementById("result").innerText = out;

  /* 自動スクロール */
  document.getElementById("result").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
