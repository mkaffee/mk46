<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mk46 v2.8（4:6メソッド）</title>

<style>
  body {
    font-family: sans-serif;
    margin: 0;
    background: #fafafa;
  }

  /* ★ 全体を包む安定レイアウト */
  #wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    background: #fff;
    min-height: 100vh;
    box-sizing: border-box;
  }

  input, button {
    font-size: 1.2rem;
    padding: 6px;
    margin: 4px 0;
  }

  input {
    width: 100%;
    box-sizing: border-box;
  }

  .row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .row input {
    flex: 1;
  }

  .ratio-buttons button {
    margin-right: 8px;
  }

  #result {
    margin-top: 20px;
    padding: 12px;
    background: #f0f0f0;
    border-radius: 6px;
    white-space: pre-line;
  }
</style>
</head>

<body>
<div id="wrap">

<h2>mk46 v2.8（4:6メソッド）</h2>

<div class="row">
  <input id="final" type="number" placeholder="出来上がり(g)">
  <input id="beans" type="number" placeholder="豆量(g)">
</div>

<div class="row">
  <input id="beanName" type="text" placeholder="豆名">
  <button id="beanList">リスト</button>
  <button id="beanDelete">削除</button>
</div>

<p>蒸らし倍率：</p>
<div class="ratio-buttons">
  <button onclick="setRatio(2.3)">2.3</button>
  <button onclick="setRatio(2.5)">2.5</button>
  <button onclick="setRatio(2.7)">2.7</button>
  <button onclick="setRatio(3.0)">3.0</button>
</div>

<button onclick="calc()">計算する</button>

<div id="result"></div>

</div><!-- wrap end -->

<script>
let beanData = JSON.parse(localStorage.getItem("beanData") || "{}");
let lastBean = localStorage.getItem("lastBean") || "";

const final = document.getElementById("final");
const beans = document.getElementById("beans");
const beanName = document.getElementById("beanName");
const beanList = document.getElementById("beanList");
const beanDelete = document.getElementById("beanDelete");
const result = document.getElementById("result");

document.addEventListener("DOMContentLoaded", () => {
  if (lastBean && beanData[lastBean] !== undefined) {
    beanName.value = lastBean;
    beans.value = beanData[lastBean];
  }
  updateBeanList();
});

function updateBeanList() {
  beanList.textContent = "リスト(" + Object.keys(beanData).length + ")";
}

beanList.addEventListener("click", () => {
  const names = Object.keys(beanData);
  if (names.length === 0) {
    alert("保存された豆はありません");
    return;
  }
  const pick = prompt("豆を選択:\n" + names.join("\n"));
  if (pick && beanData[pick] !== undefined) {
    beanName.value = pick;
    beans.value = beanData[pick];
    lastBean = pick;
    localStorage.setItem("lastBean", pick);
  }
});

beanDelete.addEventListener("click", () => {
  const name = beanName.value.trim();
  if (!name || beanData[name] === undefined) return;

  if (confirm(name + " を削除しますか？")) {
    delete beanData[name];
    localStorage.setItem("beanData", JSON.stringify(beanData));
    beanName.value = "";
    beans.value = "";
    updateBeanList();
  }
});

function setRatio(r) {
  if (!final.value) return;
  beans.value = (final.value / r).toFixed(1);
}

function calc() {
  const name = beanName.value.trim();
  const beansVal = Number(beans.value);

  // ★ 変更があったときだけ保存
  if (name) {
    const prev = beanData[name];
    if (prev !== beansVal) {
      beanData[name] = beansVal;
      localStorage.setItem("beanData", JSON.stringify(beanData));
      lastBean = name;
      localStorage.setItem("lastBean", lastBean);
      updateBeanList();
    }
  }

  if (!final.value || !beans.value) {
    result.textContent = "出来上がり量と豆量を入力してください";
    return;
  }

  const total = Number(final.value);
  const b = Number(beans.value);

  const first = Math.round(total * 0.15);
  const second = Math.round(total * 0.25);
  const third = Math.round(total * 0.30);
  const fourth = total - (first + second + third);

  result.textContent =
    `【4:6メソッド】 ${name ? name + "：" : ""}${b} g\n\n` +
    "—— 前半40%（フレーバー） ——\n" +
    `1投目：${first} g　（累計 ${first} g）\n` +
    `2投目：${second} g　（累計 ${first + second} g）\n\n` +
    "—— 後半60%（濃度調整） ——\n" +
    `3投目：${third} g　（累計 ${first + second + third} g）\n` +
    `4投目：${fourth} g　（累計 ${total} g）`;
}
</script>

</body>
</html>
